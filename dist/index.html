<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevax - Voice Calls Made Simple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .nvx-root {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #050505 0%, #000000 30%, #050505 100%);
            padding: 24px;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            transform: perspective(1000px) rotateX(0deg);
            transform-style: preserve-3d;
            box-shadow: 
                0 0 50px rgba(0, 255, 0, 0.3),
                inset 0 0 100px rgba(0, 255, 0, 0.05);
        }

        .nvx-window-controls {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 8px;
            padding: 16px 24px 0 0;
            z-index: 1000;
        }

        .nvx-drag-region {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .nvx-drag-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
        }

        .nvx-window-btn {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            clip-path: polygon(3% 0%, 97% 2%, 100% 87%, 87% 100%, 2% 98%, 0% 13%);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            pointer-events: auto;
        }

        .nvx-window-btn:hover {
            background: linear-gradient(135deg, #001a00 0%, #003300 50%, #001a00 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .nvx-window-btn.close {
            border-color: #ff0000;
            color: #ff0000;
        }

        .nvx-window-btn.close:hover {
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .nvx-window-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.02) 2px,
                rgba(0, 255, 0, 0.02) 4px
            );
            pointer-events: none;
        }

        .nvx-window-btn.close::before {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(255, 0, 0, 0.02) 2px,
                rgba(255, 0, 0, 0.02) 4px
            );
        }

        body {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: #00ff00;
            position: relative;
            background: linear-gradient(180deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.3),
                rgba(0, 0, 0, 0.3) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 100;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.5) 90%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 99;
        }

        .nvx-root {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #050505 0%, #000000 30%, #050505 100%);
            padding: 24px;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            transform: perspective(1000px) rotateX(0deg);
            transform-style: preserve-3d;
            box-shadow: 
                0 0 50px rgba(0, 255, 0, 0.3),
                inset 0 0 100px rgba(0, 255, 0, 0.05);
            pointer-events: none;
        }

        .nvx-root > * {
            pointer-events: auto;
        }

        .nvx-root::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.01),
                rgba(0, 255, 0, 0.01) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
        }

        .nvx-root::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                rgba(0, 255, 0, 0.005),
                rgba(0, 255, 0, 0.005) 1px,
                transparent 1px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .nvx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .nvx-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.9), 0 0 60px rgba(0, 255, 0, 0.4), inset 0 0 25px rgba(0, 255, 0, 0.2);
            flex-shrink: 0;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8), 0 0 20px rgba(0, 255, 0, 0.5);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
                text-shadow: 0 0 10px rgba(0, 255, 0, 0.8), 0 0 20px rgba(0, 255, 0, 0.5);
            }
            91% {
                transform: translate(-2px, 1px);
                text-shadow: 2px 0 #ff0000, -2px 0 #00ffff;
            }
            92% {
                transform: translate(2px, -1px);
                text-shadow: -2px 0 #ff0000, 2px 0 #00ffff;
            }
            93% {
                transform: translate(-1px, 2px);
            }
            94% {
                transform: translate(1px, -2px);
            }
        }

        
        .nvx-badge {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.35);
            color: #f87171;
            font-size: 10px;
            padding: 3px 9px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 8px rgba(220,38,38,0.15);
        }

        .nvx-friend-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        
        .nvx-friend-info {
            flex: 1;
        }

        .nvx-friend-label {
            font-size: 11px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            font-weight: 500;
            margin: 0 0 2px;
        }

        .nvx-friend-val {
            font-size: 17px;
            font-weight: 500;
            color: #00ff00;
            margin: 0;
            font-family: 'Syne', sans-serif;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .nvx-settings-section {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            border-radius: 0;
            padding: 18px;
            margin-bottom: 24px;
            box-shadow: 
                0 0 25px rgba(0, 255, 0, 0.4), 
                inset 0 0 25px rgba(0, 255, 0, 0.15), 
                0 8px 16px rgba(0, 0, 0, 0.6),
                0 -4px 8px rgba(0, 255, 0, 0.3);
            clip-path: polygon(1% 0%, 99% 2%, 100% 89%, 94% 100%, 2% 98%, 0% 11%);
            position: relative;
            transform: perspective(500px) rotateX(0deg);
            transform-style: preserve-3d;
        }

        .nvx-settings-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0, 255, 0, 0.02) 3px,
                rgba(0, 255, 0, 0.02) 6px
            );
            pointer-events: none;
        }

        .nvx-settings-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.08) 0%, transparent 50%, rgba(0, 255, 0, 0.08) 100%);
            pointer-events: none;
        }

        .nvx-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .nvx-control-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .nvx-btn {
            width: 90px;
            height: 90px;
            border-radius: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            clip-path: polygon(2% 0%, 98% 1%, 100% 84%, 93% 100%, 1% 98%, 0% 15%);
            box-shadow: 
                0 0 15px rgba(0, 255, 0, 0.3), 
                inset 0 0 15px rgba(0, 255, 0, 0.1),
                0 8px 16px rgba(0, 0, 0, 0.5),
                0 -4px 8px rgba(0, 255, 0, 0.2);
            transform: perspective(500px) rotateX(0deg);
            transform-style: preserve-3d;
        }

        .nvx-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.03) 2px,
                rgba(0, 255, 0, 0.03) 4px
            );
            pointer-events: none;
        }

        .nvx-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1) 0%, transparent 50%, rgba(0, 255, 0, 0.1) 100%);
            pointer-events: none;
        }

        .nvx-btn:hover {
            background: linear-gradient(135deg, #001a00 0%, #003300 50%, #001a00 100%);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6), inset 0 0 20px rgba(0, 255, 0, 0.2);
            border-color: #00ff00;
        }

        .nvx-btn:active {
            background: linear-gradient(135deg, #002200 0%, #004400 50%, #002200 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8), inset 0 0 25px rgba(0, 255, 0, 0.3);
        }

        .nvx-btn.in-call {
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%);
            border-color: #ff0000;
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), inset 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .nvx-btn.in-call:hover {
            background: linear-gradient(135deg, #220000 0%, #440000 50%, #220000 100%);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.9), inset 0 0 25px rgba(255, 0, 0, 0.3);
        }

        .nvx-btn i {
            font-size: 24px;
        }

        .nvx-settings {
            background: linear-gradient(135deg, rgba(220,38,38,0.2), rgba(220,38,38,0.1));
        }

        .nvx-settings:hover {
            background: linear-gradient(135deg, rgba(220,38,38,0.3), rgba(220,38,38,0.2));
        }

        .nvx-vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            position: relative;
        }

        .nvx-vol-label {
            font-size: 11px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            font-weight: 500;
        }

        .nvx-slider-container {
            flex: 1;
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
            min-width: 0;
            overflow: hidden;
        }

        .nvx-scale {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            display: flex;
            gap: 3px;
            padding: 3px;
            clip-path: polygon(2% 0%, 98% 1%, 100% 86%, 94% 100%, 1% 98%, 0% 14%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 15px rgba(0, 255, 0, 0.1);
            flex-shrink: 0;
        }

        .nvx-scale::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.02) 2px,
                rgba(0, 255, 0, 0.02) 4px
            );
            pointer-events: none;
        }

        .nvx-scale-block {
            flex: 1 1 0;
            min-width: 0;
            background: linear-gradient(135deg, #050505 0%, #0a0a0a 50%, #050505 100%);
            border: 1px solid #003300;
            transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            clip-path: polygon(3% 0%, 97% 2%, 100% 87%, 87% 100%, 2% 98%, 0% 13%);
        }

        .nvx-scale-block.active {
            background: linear-gradient(135deg, #00cc00 0%, #00ff00 50%, #00cc00 100%);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.9), inset 0 0 8px rgba(0, 0, 0, 0.3);
            border-color: #00ff00;
        }

        .nvx-slider {
            position: absolute;
            width: 100%;
            -webkit-appearance: none;
            height: 24px;
            background: transparent;
            outline: none;
            cursor: pointer;
            z-index: 2;
        }

        .nvx-slider::-webkit-slider-runnable-track {
            height: 24px;
            background: transparent;
        }

        .nvx-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.9), 0 0 30px rgba(0, 255, 0, 0.4);
            cursor: pointer;
            margin-top: 0;
            border: 3px solid #000000;
            clip-path: polygon(52% 0%, 100% 48%, 48% 100%, 0% 52%);
            animation: thumbDamage 4s infinite;
        }

        @keyframes thumbDamage {
            0%, 85%, 100% {
                clip-path: polygon(52% 0%, 100% 48%, 48% 100%, 0% 52%);
            }
            86% {
                clip-path: polygon(48% 2%, 98% 52%, 52% 98%, 2% 48%);
            }
            87% {
                clip-path: polygon(54% 0%, 100% 46%, 46% 100%, 0% 54%);
            }
            88% {
                clip-path: polygon(50% 1%, 99% 50%, 50% 99%, 1% 50%);
            }
        }

        .nvx-vol-pct {
            font-size: 12px;
            color: #00ff00;
            min-width: 45px;
            width: 45px;
            max-width: 45px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            text-align: right;
        }


        .nvx-field {
            margin-bottom: 14px;
        }

        .nvx-field-label {
            font-size: 11px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .nvx-input {
            width: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            border-radius: 0;
            padding: 12px;
            color: #00ff00;
            font-family: 'Syne', sans-serif;
            box-shadow: 
                0 0 15px rgba(0, 255, 0, 0.3), 
                inset 0 0 15px rgba(0, 255, 0, 0.1), 
                0 4px 8px rgba(0, 0, 0, 0.6),
                0 -2px 4px rgba(0, 255, 0, 0.2);
            clip-path: polygon(1% 0%, 99% 1%, 100% 86%, 96% 100%, 2% 99%, 0% 14%);
            position: relative;
            transform: perspective(500px) rotateX(0deg);
            transform-style: preserve-3d;
        }

        .nvx-input::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.02) 2px,
                rgba(0, 255, 0, 0.02) 4px
            );
            pointer-events: none;
        }

        /* === NEW FEATURES CSS === */

        /* Stats Panel */
        .nvx-stats {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            padding: 12px;
            margin-top: 14px;
            clip-path: polygon(1% 0%, 99% 2%, 100% 89%, 94% 100%, 2% 98%, 0% 11%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .nvx-stat-item {
            text-align: center;
        }
        .nvx-stat-label {
            font-size: 10px;
            color: #00aa00;
            text-transform: uppercase;
            display: block;
        }
        .nvx-stat-value {
            font-size: 14px;
            color: #00ff00;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        /* Contacts Section */
        .nvx-contacts-section {
            margin-top: 14px;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            padding: 14px;
            clip-path: polygon(1% 0%, 99% 2%, 100% 89%, 94% 100%, 2% 98%, 0% 11%);
        }
        .nvx-section-title {
            font-size: 12px;
            color: #00ff00;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .nvx-contacts-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .nvx-contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #003300;
            cursor: pointer;
        }
        .nvx-contact-item:hover {
            background: rgba(0, 255, 0, 0.05);
        }
        .nvx-contact-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }
        .nvx-contact-status.online {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }
        .nvx-contact-status.offline {
            background: #ff0000;
        }
        .nvx-contact-status.in-call {
            background: #ffff00;
            box-shadow: 0 0 8px #ffff00;
        }
        .nvx-contact-name {
            flex: 1;
            color: #00ff00;
            font-size: 13px;
        }
        .nvx-contact-call {
            width: 28px;
            height: 28px;
            background: #001100;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            clip-path: polygon(3% 0%, 97% 2%, 100% 87%, 87% 100%, 2% 98%, 0% 13%);
        }
        .nvx-contact-call:hover {
            background: #003300;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .nvx-add-contact {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            clip-path: polygon(2% 0%, 98% 1%, 100% 86%, 94% 100%, 1% 98%, 0% 14%);
        }
        .nvx-add-contact:hover {
            background: linear-gradient(135deg, #001a00 0%, #003300 50%, #001a00 100%);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        /* Video Container */
        .nvx-video-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 640px;
            height: 480px;
            background: #000;
            border: 3px solid #00ff00;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
        }
        .nvx-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #localVideo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 120px;
            height: 90px;
            border: 2px solid #00ff00;
        }

        /* Chat Section */
        .nvx-chat-section {
            margin-top: 14px;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #0a0a0a 100%);
            border: 2px solid #00ff00;
            padding: 14px;
            clip-path: polygon(1% 0%, 99% 2%, 100% 89%, 94% 100%, 2% 98%, 0% 11%);
        }
        .nvx-chat-messages {
            height: 100px;
            overflow-y: auto;
            background: #000;
            border: 1px solid #003300;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .nvx-chat-message {
            margin-bottom: 5px;
            color: #00ff00;
        }
        .nvx-chat-message.system {
            color: #00aa00;
            font-style: italic;
        }
        .nvx-chat-input-row {
            display: flex;
            gap: 8px;
        }
        .nvx-chat-input {
            flex: 1;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
        }
        .nvx-chat-input::placeholder {
            color: #005500;
        }
        .nvx-chat-send {
            width: 36px;
            height: 36px;
            background: #001100;
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            clip-path: polygon(3% 0%, 97% 2%, 100% 87%, 87% 100%, 2% 98%, 0% 13%);

    <script>

    // === TAURI INVOKE HELPER ===
    function tauriInvoke(cmd) {
        // Method 1: window.__TAURI__.core.invoke (Tauri v2 withGlobalTauri)
        if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
            return window.__TAURI__.core.invoke(cmd);
        }
        // Method 2: window.__TAURI_INTERNALS__.invoke
        if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) {
            return window.__TAURI_INTERNALS__.invoke(cmd);
        }
        // Method 3: window.__TAURI__.invoke (Tauri v1 style)
        if (window.__TAURI__ && window.__TAURI__.invoke) {
            return window.__TAURI__.invoke(cmd);
        }
        return Promise.reject('No Tauri API found');
    }

    // === WINDOW CONTROLS ===
    async function minimizeWindow() {
        console.log('minimizeWindow called, __TAURI__:', !!window.__TAURI__);
        try {
            console.log('Trying invoke minimize_window...');
            await tauriInvoke('minimize_window');
            console.log('invoke minimize succeeded');
            return;
        } catch(e) { console.log('invoke minimize failed:', e); }
        try {
            if (window.__TAURI__ && window.__TAURI__.window && window.__TAURI__.window.getCurrentWindow) {
                console.log('Trying window API minimize...');
                await window.__TAURI__.window.getCurrentWindow().minimize();
                console.log('window API minimize succeeded');
                return;
            }
        } catch(e) { console.log('window API minimize failed:', e); }
    }

    async function closeWindow() {
        console.log('closeWindow called, __TAURI__:', !!window.__TAURI__);
        try {
            console.log('Trying invoke close_window...');
            await tauriInvoke('close_window');
            console.log('invoke close succeeded');
            return;
        } catch(e) { console.log('invoke close failed:', e); }
        try {
            if (window.__TAURI__ && window.__TAURI__.window && window.__TAURI__.window.getCurrentWindow) {
                console.log('Trying window API close...');
                await window.__TAURI__.window.getCurrentWindow().close();
                console.log('window API close succeeded');
                return;
            }
        } catch(e) { console.log('window API close failed:', e); }
    }

    // === DRAG ===
    async function startDrag() {
        try {
            await tauriInvoke('start_drag');
            return;
        } catch(e) { console.log('invoke drag failed:', e); }
        try {
            if (window.__TAURI__ && window.__TAURI__.window && window.__TAURI__.window.getCurrentWindow) {
                await window.__TAURI__.window.getCurrentWindow().startDragging();
                return;
            }
        } catch(e) { console.log('window API drag failed:', e); }
    }

    // === INIT ===
    document.addEventListener('DOMContentLoaded', function() {
        // Drag on header
        var header = document.querySelector('.nvx-header');
        if (header) {
            header.addEventListener('mousedown', function(e) {
                if (e.target.closest('button') || e.target.closest('.nvx-window-controls')) return;
                startDrag();
            });

        // Drag on friend-row

        if (friendRow) {

                if (e.target.closest('button') || e.target.closest('input')) return;
                startDrag();

        }

        // Drag on settings-section
        var settings = document.querySelector('.nvx-settings-section');
        if (settings) {
            settings.addEventListener('mousedown', function(e) {
                if (e.target.closest('button') || e.target.closest('input')) return;
                startDrag();
            });
        }

        // Drag on controls
        var controls = document.querySelector('.nvx-controls');
        if (controls) {
            controls.addEventListener('mousedown', function(e) {
                if (e.target.closest('button') || e.target.closest('.nvx-btn')) return;
                startDrag();
            });
        }

        // Drag on vol-row
        var volRow = document.querySelector('.nvx-vol-row');
        if (volRow) {
            volRow.addEventListener('mousedown', function(e) {
                if (e.target.closest('button') || e.target.closest('input')) return;
                startDrag();
            });
        }

        // Debug: log Tauri API availability
        console.log('__TAURI__ exists:', !!window.__TAURI__);
        if (window.__TAURI__) {
            console.log('__TAURI__.core:', !!window.__TAURI__.core);
            console.log('__TAURI__.window:', !!window.__TAURI__.window);
            console.log('__TAURI__.invoke:', !!window.__TAURI__.invoke);
        }
        console.log('__TAURI_INTERNALS__ exists:', !!window.__TAURI_INTERNALS__);
    });

    function handleCall(e) {
        inCall = !inCall;
        var btn = document.getElementById('callBtn');
        if (inCall) {
            btn.classList.add('in-call');
        } else {
            btn.classList.remove('in-call');
        }
    }

    function handleMute(e) {
        muted = !muted;
        var btn = document.getElementById('muteBtn');
        var lbl = document.getElementById('muteLbl');
        if (muted) {
            btn.classList.add('active');
            lbl.textContent = 'Unmute';
        } else {
            btn.classList.remove('active');
            lbl.textContent = 'Mute Mic';
        }
    }

    function updateVol(slider) {
        var pct = slider.value;
        document.getElementById('volPct').textContent = pct + '%';
        var blocks = document.querySelectorAll('.nvx-scale-block');
        var activeCount = Math.ceil(pct / 10);
        blocks.forEach(function(block, index) {
            if (index < activeCount) {
                block.classList.add('active');
            } else {
                block.classList.remove('active');
            }
        });
    }

    </script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="webrtc.js"></script>
</body>
