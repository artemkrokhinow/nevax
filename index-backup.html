<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevax - Voice Calls Made Simple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: #4ade80;
            box-shadow: 0 0 16px rgba(74,222,128,0.35), inset 0 0 12px rgba(74,222,128,0.1);
            flex-shrink: 0;
            position: relative;
            background: linear-gradient(135deg, #0d1f14 0%, #0a0f0f 50%, #050505 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .nvx-root {
            width: 100%;
            max-width: 400px;
            background: rgba(13, 17, 23, 0.95);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .nvx-root::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 20px;
        }

        .nvx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .nvx-title {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: #4ade80;
            box-shadow: 0 0 16px rgba(74,222,128,0.35), inset 0 0 12px rgba(74,222,128,0.1);
            flex-shrink: 0;
            position: relative;
        }

        .nvx-subtitle {
            font-size: 14px;
            color: rgba(74,222,128,0.7);
            margin-top: 4px;
        }

        .nvx-badge {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.35);
            color: #f87171;
            font-size: 10px;
            padding: 3px 9px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 8px rgba(220,38,38,0.15);
        }

        .nvx-friend-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .nvx-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #4ade80;
            position: relative;
            box-shadow: 0 0 12px rgba(74,222,128,0.2);
        }

        .nvx-avatar::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid rgba(74,222,128,0.18);
        }

        .nvx-friend-info {
            flex: 1;
        }

        .nvx-friend-label {
            font-size: 11px;
            color: rgba(74,222,128,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            font-weight: 500;
            margin: 0 0 2px;
        }

        .nvx-friend-val {
            font-size: 17px;
            font-weight: 500;
            color: #d1fae5;
            margin: 0;
            font-family: 'Syne', sans-serif;
        }

        .nvx-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            position: relative;
        }

        .nvx-control-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .nvx-btn {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.1));
            border: 2px solid rgba(74,222,128,0.3);
            color: #4ade80;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            position: relative;
            overflow: hidden;
        }

        .nvx-btn:hover {
            background: linear-gradient(135deg, rgba(34,197,94,0.3), rgba(34,197,94,0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74,222,128,0.4);
        }

        .nvx-btn:active {
            transform: scale(0.95);
        }

        .nvx-btn i {
            font-size: 24px;
        }

        .nvx-settings {
            background: linear-gradient(135deg, rgba(220,38,38,0.2), rgba(220,38,38,0.1));
        }

        .nvx-settings:hover {
            background: linear-gradient(135deg, rgba(220,38,38,0.3), rgba(220,38,38,0.2));
        }

        .nvx-vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        .nvx-vol-label {
            font-size: 11px;
            color: rgba(74,222,128,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            font-weight: 500;
        }

        .nvx-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 4px;
            background: rgba(74,222,128,0.12);
            outline: none;
            cursor: pointer;
        }

        .nvx-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74,222,128,0.8);
            cursor: pointer;
        }

        .nvx-vol-pct {
            font-size: 12px;
            color: rgba(74,222,128,0.55);
            min-width: 30px;
            text-align: right;
        }

        .ripple-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 20px;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-out 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            pointer-events: none;
            background: radial-gradient(circle at 30% 30%, rgba(74,222,128,0.6) 0%, rgba(74,222,128,0.3) 25%, rgba(34,197,94,0.15) 60%, transparent 100%);
            box-shadow: 
                0 0 30px rgba(74,222,128,0.4),
                0 0 60px rgba(34,197,94,0.2),
                inset 0 0 25px rgba(74,222,128,0.15),
                inset 0 0 50px rgba(34,197,94,0.08);
            filter: blur(0.5px);
        }

        @keyframes ripple-out {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                transform: scale(0.6) rotate(90deg);
                opacity: 0.9;
            }
            60% {
                transform: scale(0.9) rotate(180deg);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }

        .nvx-settings-panel {
            background: rgba(13, 17, 23, 0.05);
            border: 1px solid rgba(74,222,128,0.1);
            border-radius: 16px;
            padding: 18px;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
            max-height: 0;
            opacity: 0;
        }

        .nvx-settings-panel.hidden {
            max-height: 0;
            opacity: 0;
            padding: 0 18px;
            border-color: transparent;
        }

        .nvx-settings-panel.shown {
            max-height: 320px;
            opacity: 1;
        }

        .nvx-field {
            margin-bottom: 14px;
        }

        .nvx-field-label {
            font-size: 11px;
            color: rgba(74,222,128,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .nvx-input {
            width: 100%;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(74,222,128,0.18);
            border-radius: 10px;
            padding: 12px;
            color: #4ade80;
            font-family: 'Syne', sans-serif;
        }

        .nvx-seg-btn {
            width: 100%;
            padding: 12px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(74,222,128,0.2);
            border-radius: 12px;
            color: rgba(74,222,128,0.4);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-align: center;
        }

        .nvx-seg-btn:hover {
            background: rgba(34,197,94,0.3);
            color: #4ade80;
        }

        .nvx-seg-btn.active {
            background: rgba(34,197,94,0.3);
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="nvx-root" id="nvxRoot">
        <div class="nvx-header">
            <div>
                <p class="nvx-title">Nevax</p>
                <p class="nvx-subtitle">Voice calls made simple. One friend, one button.</p>
            </div>
            <div class="nvx-badge">offline</div>
        </div>

        <div class="nvx-friend-row">
            <div class="nvx-avatar">N</div>
            <div class="nvx-friend-info">
                <p class="nvx-friend-label">Friend</p>
                <p class="nvx-friend-val">friend_id: 2</p>
            </div>
            <div class="nvx-badge-sm">offline</div>
        </div>

        <div class="nvx-controls">
            <div class="nvx-control-wrapper">
                <button class="nvx-btn" id="callBtn" onclick="handleCall(event)">
                    <i class="fa-solid fa-phone"></i>
                </button>
            </div>
            <div class="nvx-control-wrapper">
                <button class="nvx-btn" id="muteBtn" onclick="handleMute(event)">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
            <div class="nvx-control-wrapper">
                <button class="nvx-btn nvx-settings" id="settingsBtn" onclick="handleSettings(event)">
                    <i class="fa-solid fa-cog"></i>
                </button>
            </div>
        </div>

        <div class="nvx-vol-row">
            <input class="nvx-slider" type="range" min="0" max="100" value="21" step="1" id="volSlider" oninput="updateVol(this, event)" />
            <span class="nvx-vol-pct" id="volPct">21%</span>
        </div>
    </div>

    <div class="nvx-settings-panel hidden" id="settingsPanel">
        <div class="nvx-field">
            <div class="nvx-field-label">My ID</div>
            <input class="nvx-input" type="text" placeholder="Enter your ID..." value="user_42" />
        </div>
        <div class="nvx-field">
            <div class="nvx-field-label">Friend ID</div>
            <input class="nvx-input" type="text" placeholder="Enter friend ID..." value="2" />
        </div>
        <div class="nvx-field">
            <button class="nvx-seg-btn" id="noiseSeg" onclick="selectNoise('white')">White Noise</button>
        </div>
        <div class="nvx-field">
            <button class="nvx-seg-btn" id="pinkSeg" onclick="selectNoise('pink')">Pink Noise</button>
        </div>
        <div class="nvx-field">
            <button class="nvx-seg-btn" id="brownSeg" onclick="selectNoise('brown')">Brown Noise</button>
        </div>
    </div>

    <script>
    var muted = false;
    var settingsOpen = false;

    function spawnRipple(x, y, color, container) {
        var parentContainer = container.parentElement || container;
        var rect = parentContainer.getBoundingClientRect();
        var rx = x - rect.left;
        var ry = y - rect.top;
        var size = Math.max(rect.width, rect.height) * 1.3;
        
        var ripple = document.createElement('div');
        ripple.className = 'ripple';
        
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (rx - size/2) + 'px';
        ripple.style.top = (ry - size/2) + 'px';
        ripple.style.background = 'radial-gradient(circle, ' + color.replace('0.7', '0.4') + ' 0%, ' + color.replace('0.7', '0.15') + ' 60%, transparent 100%)';
        ripple.style.animation = 'ripple-out 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards';
        
        parentContainer.appendChild(ripple);
        setTimeout(function() { ripple.remove(); }, 2000);
    }

    function handleCall(e) {
        spawnRipple(e.clientX, e.clientY, 'rgba(74,222,128,0.7)', e.currentTarget);
    }

    function handleMute(e) {
        muted = !muted;
        var btn = document.getElementById('muteBtn');
        var lbl = document.getElementById('muteLbl');
        if (muted) {
            btn.classList.add('active');
            lbl.textContent = 'Unmute';
        } else {
            btn.classList.remove('active');
            lbl.textContent = 'Mute Mic';
        }
    }

    function handleSettings(e) {
        settingsOpen = !settingsOpen;
        var panel = document.getElementById('settingsPanel');
        if (settingsOpen) {
            panel.classList.remove('hidden');
            panel.classList.add('shown');
        } else {
            panel.classList.remove('shown');
            panel.classList.add('hidden');
        }
    }

    function updateVol(slider, event) {
        var pct = slider.value;
        document.getElementById('volPct').textContent = pct + '%';
        spawnRipple(event.clientX, event.clientY, 'rgba(74,222,128,0.7)', slider.parentElement);
    }

    function selectNoise(type) {
        var buttons = document.querySelectorAll('.nvx-seg-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        document.getElementById(type + 'Seg').classList.add('active');
    }
    </script>
</body>
</html>
